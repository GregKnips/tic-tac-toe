<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      font-family: 'Segoe UI', sans-serif;
      color: #eee;
    }

    h1 {
      font-size: 2.5rem;
      margin-bottom: 1.5rem;
      letter-spacing: 3px;
      color: #e94560;
    }

    .status {
      font-size: 1.2rem;
      margin-bottom: 1.5rem;
      height: 1.5em;
      color: #a8dadc;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(3, 110px);
      grid-template-rows: repeat(3, 110px);
      gap: 8px;
    }

    .cell {
      background: #16213e;
      border: 2px solid #0f3460;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 3rem;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #0f3460;
      transform: scale(1.04);
    }

    .cell.taken {
      cursor: default;
    }

    .cell.x {
      color: transparent;
      background-image: url('ChrisButtacavoli.png');
      background-size: cover;
      background-position: center top;
    }

    .cell.o {
      color: transparent;
      background-image: url('RobAyers.png');
      background-size: cover;
      background-position: center top;
    }

    .cell.winner {
      background: #0f3460;
      border-color: #e94560;
      animation: pulse 0.5s ease-in-out infinite alternate;
    }

    @keyframes pulse {
      from { box-shadow: 0 0 6px #e94560; }
      to   { box-shadow: 0 0 18px #e94560; }
    }

    .controls {
      margin-top: 2rem;
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    button {
      padding: 0.6rem 1.6rem;
      font-size: 1rem;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      background: #e94560;
      color: #fff;
      letter-spacing: 1px;
      transition: background 0.15s, transform 0.1s;
    }

    button:hover {
      background: #c73652;
      transform: scale(1.05);
    }

    .score {
      margin-top: 1.5rem;
      display: flex;
      gap: 2.5rem;
      font-size: 1rem;
      color: #a8dadc;
    }

    .score span {
      text-align: center;
    }

    .score .label {
      display: block;
      font-size: 0.75rem;
      opacity: 0.7;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .score .num {
      display: block;
      font-size: 1.6rem;
      font-weight: bold;
    }

    .score .x-score .num { color: #e94560; }
    .score .o-score .num { color: #a8dadc; }
  </style>
</head>
<body>

<h1>TIC TAC TOE</h1>
<div class="status" id="status">X's turn</div>

<div class="board" id="board">
  <div class="cell" data-i="0"></div>
  <div class="cell" data-i="1"></div>
  <div class="cell" data-i="2"></div>
  <div class="cell" data-i="3"></div>
  <div class="cell" data-i="4"></div>
  <div class="cell" data-i="5"></div>
  <div class="cell" data-i="6"></div>
  <div class="cell" data-i="7"></div>
  <div class="cell" data-i="8"></div>
</div>

<div class="controls">
  <button id="resetBtn">New Game</button>
</div>

<div class="score">
  <span class="x-score">
    <span class="label">X Wins</span>
    <span class="num" id="xScore">0</span>
  </span>
  <span>
    <span class="label">Draws</span>
    <span class="num" id="drawScore">0</span>
  </span>
  <span class="o-score">
    <span class="label">O Wins</span>
    <span class="num" id="oScore">0</span>
  </span>
</div>

<script>
  const WINS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  let board, current, gameOver;
  let score = { X: 0, O: 0, D: 0 };

  const cells = document.querySelectorAll('.cell');
  const status = document.getElementById('status');
  const xScore = document.getElementById('xScore');
  const oScore = document.getElementById('oScore');
  const drawScore = document.getElementById('drawScore');

  function init() {
    board = Array(9).fill('');
    current = 'X';
    gameOver = false;
    cells.forEach(c => {
      c.textContent = '';
      c.className = 'cell';
    });
    status.textContent = "X's turn";
  }

  function checkWinner() {
    for (const [a, b, c] of WINS) {
      if (board[a] && board[a] === board[b] && board[a] === board[c]) {
        return { winner: board[a], line: [a, b, c] };
      }
    }
    if (board.every(v => v)) return { winner: 'draw' };
    return null;
  }

  cells.forEach(cell => {
    cell.addEventListener('click', () => {
      const i = parseInt(cell.dataset.i);
      if (gameOver || board[i]) return;

      board[i] = current;
      cell.textContent = current;
      cell.classList.add('taken', current.toLowerCase());

      const result = checkWinner();
      if (result) {
        gameOver = true;
        if (result.winner === 'draw') {
          status.textContent = "It's a draw!";
          score.D++;
          drawScore.textContent = score.D;
        } else {
          status.textContent = `${result.winner} wins!`;
          result.line.forEach(idx => cells[idx].classList.add('winner'));
          score[result.winner]++;
          xScore.textContent = score.X;
          oScore.textContent = score.O;
        }
      } else {
        current = current === 'X' ? 'O' : 'X';
        status.textContent = `${current}'s turn`;
      }
    });
  });

  document.getElementById('resetBtn').addEventListener('click', init);

  init();
</script>
</body>
</html>
